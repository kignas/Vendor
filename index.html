<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Partner Login – EatSwada</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --brand: #1c1c1c;
      --brand-accent: #FC8019;
      --bg: #f3f4f6;
      --surface: #ffffff;
      --text-1: #111827;
      --text-2: #4b5563;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-1); display: flex; align-items: center; justify-content: center; height: 100dvh; padding: 20px; }
    
    .login-card { background: var(--surface); width: 100%; max-width: 400px; border-radius: 24px; padding: 32px 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center; }
    .brand-icon { width: 64px; height: 64px; background: #fff4ec; color: var(--brand-accent); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 20px; }
    
    h1 { font-size: 24px; font-weight: 900; margin-bottom: 8px; color: var(--text-1); letter-spacing: -0.5px; }
    p { font-size: 14px; font-weight: 600; color: var(--text-2); margin-bottom: 32px; }

    .input-group { text-align: left; margin-bottom: 16px; }
    .input-group label { display: block; font-size: 11px; font-weight: 800; color: var(--text-2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .input-field { width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 14px; font-size: 14px; font-family: inherit; font-weight: 700; outline: none; transition: 0.2s; background: #f9fafb; color: var(--text-1); }
    .input-field:focus { border-color: var(--brand-accent); background: #fff; }

    .btn-login { width: 100%; background: var(--brand-accent); color: #fff; border: none; padding: 16px; border-radius: 12px; font-size: 15px; font-weight: 800; font-family: inherit; margin-top: 16px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 14px rgba(252, 128, 25, 0.25); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { background: var(--border); color: #9ca3af; box-shadow: none; }

    #error-msg { color: #dc2626; font-size: 13px; font-weight: 700; margin-top: 16px; display: none; background: #fef2f2; padding: 10px; border-radius: 8px; border: 1px dashed #fca5a5; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="brand-icon"><i class="fa-solid fa-shop"></i></div>
    <h1>EatSwada Partner</h1>
    <p>Manage your restaurant & live orders</p>

    <div class="input-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" class="input-field" placeholder="Enter your 10-digit number" maxlength="10">
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" class="input-field" placeholder="Enter your password">
    </div>

    <div id="error-msg">Invalid login credentials.</div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">Secure Login</button>
  </div>

  <script>
    // If they are already logged in, send them straight to the dashboard!
    if (localStorage.getItem('nearbite_token') || localStorage.getItem('token')) {
        window.location.href = 'vendor.html';
    }

    async function handleLogin() {
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('error-msg');

      if (!phone || !password) {
          errorMsg.style.display = 'block';
          errorMsg.innerText = 'Please enter both phone and password.';
          return;
      }

      btn.innerText = 'Verifying...';
      btn.disabled = true;
      errorMsg.style.display = 'none';

      try {
        const response = await fetch('https://eatswada.onrender.com/api/users/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password })
        });

        const result = await response.json();

        if (response.ok && result.token) {
           // 1. Check if they actually have vendor privileges!
           if (result.user && (result.user.role === 'vendor' || result.user.role === 'admin' || result.user.role === 'restaurant_owner')) {
               // 2. Save the secure token
               localStorage.setItem('nearbite_token', result.token);
               localStorage.setItem('token', result.token);
               
               // 3. Welcome to the dashboard
               btn.innerText = 'Success!';
               btn.style.background = '#16a34a';
               setTimeout(() => { window.location.href = 'vendor.html'; }, 500);
           } else {
               errorMsg.style.display = 'block';
               errorMsg.innerText = 'Access Denied: You are not registered as a Restaurant Owner.';
               btn.innerText = 'Secure Login';
               btn.disabled = false;
           }
        } else {
           errorMsg.style.display = 'block';
           errorMsg.innerText = result.message || 'Invalid credentials.';
           btn.innerText = 'Secure Login';
           btn.disabled = false;
        }
      } catch (err) {
        errorMsg.style.display = 'block';
        errorMsg.innerText = 'Network error. Cannot reach the server.';
        btn.innerText = 'Secure Login';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
